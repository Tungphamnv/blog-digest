name: Blog Digest

on:
  schedule:
    # Chạy mỗi 2 giờ. Cron dùng giờ UTC. (VD "0 */2 * * *" = phút 0 mỗi 2 tiếng)
    # Lưu ý: cron của GitHub Actions có thể trễ vài phút, đặc biệt giờ cao điểm.
    - cron: "0 */2 * * *"
  # Cho phép bấm chạy tay từ tab Actions để test
  workflow_dispatch:

# Cần quyền ghi để commit state.json ngược vào repo
permissions:
  contents: write

# Không cho 2 lần chạy chồng lên nhau (tránh ghi đè state)
concurrency:
  group: blog-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài đặt thư viện
        run: pip install -r requirements.txt

      - name: Chạy tóm tắt
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python summarize.py

      - name: Commit state (nếu có thay đổi)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "State không đổi, bỏ qua commit."
          else
            git commit -m "Cập nhật state [skip ci]"
            git push
          fi
